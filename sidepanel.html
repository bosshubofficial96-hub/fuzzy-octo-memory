<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CATALYST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-sparkles" id="sp-sparkles" aria-hidden="true"></div>

  <div class="sp-header">
    <div class="sp-brand">
      <span class="cat-mark" aria-hidden="true"></span>
      <span class="sp-brand-text cat-wordmark">CATALYST</span>
      <span class="sp-badge">PRO</span>
    </div>
    <div class="sp-header-actions">
      <button class="sp-icon-btn sp-notif-btn" title="Notifications">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>
      <button class="sp-icon-btn sp-theme-btn" title="Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="sp-icon-btn sp-logout-btn" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="sp-body" id="sp-body">
    <div class="sp-license-gate" id="sp-loading" style="padding:40px 0;text-align:center">
      <p style="color:var(--ql-text-muted);font-size:12px;letter-spacing:0.12em;text-transform:uppercase">Initializing…</p>
    </div>
  </div>

  <div class="sp-footer">
    <button class="sp-back-to-popup" id="sp-back-to-popup" title="Return to floating mode" style="display:none">
      ◀ Popup
    </button>
    <a href="https://t.me/prithvirajnagvanshi" target="_blank" rel="noopener noreferrer" class="sp-support-link" id="sp-support-discord">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Support
    </a>
    <span class="sp-footer-badge" id="sp-footer-version"></span>
  </div>

  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">
    <div class="sp-notif-header">
      <span>Notifications</span>
      <button class="sp-notif-close" id="sp-notif-close">✕</button>
    </div>
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty">Loading…</p>
    </div>
  </div>

  <script src="extension-config.js"></script>
  <script src="lovable-auth.js"></script>
  <script src="lovable-feature-api.js"></script>
  <script src="user-messages.js"></script>
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="license-guard.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
